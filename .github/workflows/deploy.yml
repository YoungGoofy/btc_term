name: Deploy to Server

# Запускать этот скрипт при каждом push в ветку main
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest

    steps:
      - name: Выполнение команд на сервере по SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Команды, которые будут выполнены на твоем сервере:
          script: |
            echo "🚀 Начало деплоя..."
            
            # ВАЖНО: Замени этот путь на тот, где лежит проект на твоем сервере!
            cd ~/btc_term
            
            # Забираем свежий код из GitHub
            git pull origin main
            
            # Фикс ошибки 'ContainerConfig' для старых версий docker-compose.
            # Если есть новый плагин 'docker compose', используем его. 
            # Иначе безопасно перезапускаем через старый 'docker-compose'.
            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build
            else
              docker-compose down
              docker-compose up -d --build
            fi
            
            echo "✅ Деплой успешно завершен!"
